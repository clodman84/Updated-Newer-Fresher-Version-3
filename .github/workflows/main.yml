name: Release Build and Publish

on:
  release:
    types: [published]

jobs:
  build_release:
    name: Build release binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ github.event.release.tag_name }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'vendored/**') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ github.event.release.tag_name }}-
            ${{ runner.os }}-build-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libdbus-1-dev \
            libudev-dev

      - name: Configure CMake (non-Windows)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows static runtime)
        if: runner.os == 'Windows'
        run: >-
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_FLAGS_RELEASE="-O3 -static -static-libgcc"
          -DCMAKE_CXX_FLAGS_RELEASE="-O3 -static -static-libgcc -static-libstdc++"
          -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-static"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package binary and runtime data
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ github.event.release.tag_name }}"
          PACKAGE_ROOT="UNFV3-${TAG_NAME}"
          STAGE_DIR="dist/${PACKAGE_ROOT}"
          mkdir -p "$STAGE_DIR"

          BIN="build/UNFV3"
          BIN_NAME="UNFV3"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="build/UNFV3.exe"
            BIN_NAME="UNFV3.exe"
          fi

          if [ ! -f "$BIN" ]; then
            echo "Built binary not found at $BIN" >&2
            exit 1
          fi

          if [ ! -d "Data" ]; then
            echo "Data directory not found at repository root" >&2
            exit 1
          fi

          cp "$BIN" "$STAGE_DIR/$BIN_NAME"
          cp -R Data "$STAGE_DIR/Data"

          ARCHIVE="dist/${PACKAGE_ROOT}-${{ runner.os }}.zip"
          cmake -E tar cf "$ARCHIVE" --format=zip -- "$STAGE_DIR"

      - name: Upload package directly to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: CHANGELOG.md
          files: dist/*.zip
