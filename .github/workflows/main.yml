name: Release Build and Publish

on:
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          ref: refs/tags/${{ github.event.release.tag_name }}

      # --------------------------------------------------
      # vcpkg
      # --------------------------------------------------
      
      - uses: lukka/run-vcpkg@v11
      # --------------------------------------------------
      # Binary cache
      # --------------------------------------------------
      
      - name: Setup vcpkg binary cache
        run: |
          mkdir -p ${{ github.workspace }}/vcpkg_cache
          echo "VCPKG_FEATURE_FLAGS=manifests,binarycaching" >> $GITHUB_ENV
          echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/vcpkg_cache" >> $GITHUB_ENV
      
      # --------------------------------------------------
      # Cache binary artifacts
      # --------------------------------------------------
      
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: vcpkg_cache
          key: vcpkg-binary-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'triplets/**') }}
          restore-keys: |
            vcpkg-binary-${{ runner.os }}-
      
      # --------------------------------------------------
      # Cache installed tree
      # --------------------------------------------------
      
      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'triplets/**') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-
      
      # --------------------------------------------------
      # Platform deps
      # --------------------------------------------------

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm

      - name: macOS deps
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja nasm pkg-config patchelf

      # --------------------------------------------------
      # Configure
      # --------------------------------------------------

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DUNFV3_ENABLE_LTO=ON
          -DUNFV3_ENABLE_TRACY=OFF
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-linux-mixed
          -DVCPKG_OVERLAY_TRIPLETS=./triplets/
          
      - name: Configure (MacOS)
        if: runner.os == 'macOS'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DUNFV3_ENABLE_LTO=ON
          -DUNFV3_ENABLE_TRACY=OFF
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=arm64-osx-dynamic
        
      # --------------------------------------------------
      # Build
      # --------------------------------------------------

      - run: cmake --build build --config Release -- -j4

      # --------------------------------------------------
      # Package via CPack 
      # --------------------------------------------------

      - name: Run CPack
        run: cpack --config build/CPackConfig.cmake

      # --------------------------------------------------
      # Upload artifacts
      # --------------------------------------------------

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.tar.gz

      # --------------------------------------------------
      # Append release notes
      # --------------------------------------------------

      - name: Append release notes
        uses: actions/github-script@v7
        with:
          script: |
            const os = "${{ runner.os }}";
            const release = context.payload.release;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: release.body
            });
