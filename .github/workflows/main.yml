name: Release Build and Publish

on:
  release:
    types: [published]

jobs:
  build_release:
    name: Build release binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.ccache
            ~/Library/Caches/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('CMakeLists.txt', '.github/workflows/main.yml', 'src/**/*.cpp', 'src/**/*.h', 'src/**/*.hpp', 'src/**/*.c', 'src/**/*.cc') }}
          restore-keys: |
            ${{ runner.os }}-ccache-


      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libdbus-1-dev \
            libudev-dev \
            libopencv-dev \
            ccache

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install opencv ccache

      - name: Configure compiler cache (non-Windows)
        if: runner.os != 'Windows'
        run: |
          echo "CCACHE_DIR=${HOME}/.ccache" >> "${GITHUB_ENV}"
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "${GITHUB_ENV}"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "${GITHUB_ENV}"
          ccache --max-size=1G
          ccache --zero-stats

      - name: Configure CMake (non-Windows)
        if: runner.os != 'Windows'
        run: >-
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DUNFV3_ENABLE_LTO=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=${{ env.CMAKE_C_COMPILER_LAUNCHER }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ env.CMAKE_CXX_COMPILER_LAUNCHER }}

      - name: Configure CMake (Windows static runtime)
        if: runner.os == 'Windows'
        run: >-
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DUNFV3_ENABLE_LTO=OFF
          -DCMAKE_ASM_NASM_FLAGS_RELEASE=""
          -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-static"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Show ccache stats
        if: runner.os != 'Windows'
        run: ccache --show-stats

      - name: Save ccache
        if: always() && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.ccache
            ~/Library/Caches/ccache
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

      - name: Package binary and runtime data
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ github.event.release.tag_name }}"
          PACKAGE_ROOT="UNFV3-${TAG_NAME}"
          STAGE_DIR="dist/${PACKAGE_ROOT}"
          mkdir -p "$STAGE_DIR"

          BIN="build/UNFV3"
          BIN_NAME="UNFV3"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="build/UNFV3.exe"
            BIN_NAME="UNFV3.exe"
          fi

          if [ ! -f "$BIN" ]; then
            echo "Built binary not found at $BIN" >&2
            exit 1
          fi

          if [ ! -d "Data" ]; then
            echo "Data directory not found at repository root" >&2
            exit 1
          fi

          cp "$BIN" "$STAGE_DIR/$BIN_NAME"
          cp -R Data "$STAGE_DIR/Data"

          ARCHIVE="dist/${PACKAGE_ROOT}-${{ runner.os }}.zip"
          cmake -E tar cf "$ARCHIVE" --format=zip -- "$STAGE_DIR"

      - name: Upload package directly to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: CHANGELOG.md
          files: dist/*.zip
