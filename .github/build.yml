name: CI and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (example: 1.2.3). If set, this workflow bumps CMakeLists.txt, tags, and creates a release."
        required: false
        type: string

jobs:
  build:
    name: Build (${{ matrix.os }})
    if: (github.event_name != 'workflow_dispatch' || github.event.inputs.release_version == '') && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libdbus-1-dev \
            libudev-dev

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

  prepare_release:
    name: Prepare release version bump and tag
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate and normalize version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.release_version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_version must match X.Y.Z" >&2
            exit 1
          fi
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump project version in CMakeLists.txt
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "${{ steps.version.outputs.version }}"
          path = Path("CMakeLists.txt")
          text = path.read_text(encoding="utf-8")

          if re.search(r"project\(UNFV3\s+VERSION\s+[0-9]+\.[0-9]+\.[0-9]+\)", text):
              text = re.sub(
                  r"project\(UNFV3\s+VERSION\s+[0-9]+\.[0-9]+\.[0-9]+\)",
                  f"project(UNFV3 VERSION {version})",
                  text,
                  count=1,
              )
          else:
              text = re.sub(
                  r"project\(UNFV3\)",
                  f"project(UNFV3 VERSION {version})",
                  text,
                  count=1,
              )

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt
          if git diff --cached --quiet; then
            echo "No version file changes to commit"
          else
            git commit -m "Bump version to ${{ steps.version.outputs.tag_name }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create and push release tag
        run: |
          git tag -f "${{ steps.version.outputs.tag_name }}"
          git push origin "${{ steps.version.outputs.tag_name }}" --force

  build_release:
    name: Build release binaries (${{ matrix.os }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libdbus-1-dev \
            libudev-dev

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          BIN="build/UNFV3"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="build/UNFV3.exe"
          fi

          if [ ! -f "$BIN" ]; then
            echo "Built binary not found at $BIN" >&2
            exit 1
          fi

          ARCHIVE="dist/UNFV3-${{ github.ref_name }}-${{ runner.os }}.zip"
          cmake -E tar cf "$ARCHIVE" --format=zip "$BIN"

      - name: Upload packaged binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNFV3-${{ runner.os }}
          path: dist/*.zip

  publish_release:
    name: Publish GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build_release
    permissions:
      contents: write
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: UNFV3-*
          merge-multiple: true

      - name: Create release with CHANGELOG contents
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: release-assets/*.zip

